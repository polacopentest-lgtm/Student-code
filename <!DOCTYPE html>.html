<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgroTech</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            margin: 0;
            padding: 0;
        }

        header {
            background-color: #3B6D11;
            color: white;
            padding: 20px 40px;
            text-align: center;
        }

        main {
            max-width: 900px;
            margin: 40px auto;
            padding: 0 20px;
            text-align: center;
        }

        /* ===== CARROSSEL ===== */

        /* Caixa que esconde o que tá fora da tela */
        .carousel-container {
            position: relative;
            max-width: 800px;
            margin: 0 auto;
            overflow: hidden;
            border-radius: 12px;
        }

        /* Faixa com todos os slides lado a lado */
        .carousel {
            display: flex;
            transition: transform 0.5s ease-in-out;
        }

        /* Cada slide ocupa 100% da largura */
        .carousel-slide {
            min-width: 100%;
            box-sizing: border-box;
        }

        /* Imagem responsiva */
        .carousel-slide img {
            width: 100%;
            display: block;
            height: 350px;
            object-fit: cover;
        }

        /* Setas */
        .prev, .next {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background-color: rgba(0,0,0,0.5);
            color: white;
            border: none;
            cursor: pointer;
            padding: 16px;
            font-size: 18px;
            z-index: 10;
            border-radius: 6px;
        }
        .prev { left: 10px; }
        .next { right: 10px; }

        /* Bolinhas */
        .dots {
            text-align: center;
            padding: 12px;
        }
        .dot {
            cursor: pointer;
            height: 14px;
            width: 14px;
            margin: 0 4px;
            background-color: #bbb;
            border-radius: 50%;
            display: inline-block;
            transition: background-color 0.3s;
        }
        .active, .dot:hover {
            background-color: #3B6D11;
        }

        footer {
            background-color: #3B6D11;
            color: white;
            text-align: center;
            padding: 15px;
            margin-top: 60px;
        }
    </style>
</head>
<body>

    <header>
        <h1>🌱 AgroTech</h1>
        <p>Tecnologia no campo</p>
    </header>

    <main>
        <h2 style="color:#3B6D11;">Novos Produtos</h2>

        <div class="carousel-container">

            <!-- Os slides -->
            <div class="carousel" id="carousel">
                <div class="carousel-slide">
                    <img src="https://picsum.photos/800/350?random=10" alt="Produto 1">
                </div>
                <div class="carousel-slide">
                    <img src="https://picsum.photos/800/350?random=20" alt="Produto 2">
                </div>
                <div class="carousel-slide">
                    <img src="https://picsum.photos/800/350?random=30" alt="Produto 3">
                </div>
            </div>

            <!-- Setas -->
            <button class="prev" onclick="changeSlide(-1)">&#10094;</button>
            <button class="next" onclick="changeSlide(1)">&#10095;</button>

        </div>

        <!-- Bolinhas -->
        <div class="dots">
            <span class="dot active" onclick="currentSlide(1)"></span>
            <span class="dot" onclick="currentSlide(2)"></span>
            <span class="dot" onclick="currentSlide(3)"></span>
        </div>

    </main>

    <footer>
        <p>&copy; 2025 AgroTech — Todos os direitos reservados</p>
    </footer>

    <script>
        let slideIndex = 0; // começa no slide 0 (primeiro)

        // Avançar ou voltar
        function changeSlide(n) {
            moveSlide(slideIndex + n);
        }

        // Ir direto pra um slide
        function currentSlide(n) {
            moveSlide(n - 1);
        }

        // Função principal
        function moveSlide(n) {
            const carousel = document.getElementById("carousel");
            const dots = document.querySelectorAll(".dot");
            const total = 3; // total de slides

            // Volta ao início ou vai ao fim
            if (n >= total) n = 0;
            if (n < 0) n = total - 1;

            slideIndex = n;

            // Move a faixa com transform
            carousel.style.transform = "translateX(" + (-slideIndex * 100) + "%)";

            // Atualiza bolinhas
            dots.forEach(d => d.classList.remove("active"));
            dots[slideIndex].classList.add("active");
        }

        // Troca automática a cada 5 segundos
        setInterval(() => changeSlide(1), 5000);
    </script>

</body>
</html>
